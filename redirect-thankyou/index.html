  <head>

    <!-- ===================== INLINE STYLES ===================== -->
    <style>
      :root {
        --color-bg: #0f172a;
        --color-bg-soft: #131c33;
        --color-surface: rgba(255, 255, 255, 0.05);
        --color-surface-border: rgba(255, 255, 255, 0.1);
        --color-text: #ffffff;
        --color-text-muted: #94a3b8;
        --color-accent: #f97316;
        --color-accent-dark: #c2410c;
        --color-success: #22c55e;
        --font-main: "Poppins", -apple-system, BlinkMacSystemFont, sans-serif;
        --radius-sm: 10px;
        --radius-md: 16px;
        --radius-lg: 24px;
        --shadow-soft: 0 20px 50px rgba(0, 0, 0, 0.35);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        overflow-x: hidden;
        width: 100%;
      }

      body {
        font-family: var(--font-main);
        background-color: var(--color-bg);
        color: var(--color-text);
        line-height: 1.6;
        min-height: 100vh;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        -webkit-font-smoothing: antialiased;
      }

      a {
        text-decoration: none;
        color: inherit;
      }

      /* Decorative background grid, matching the main site's viewport-grid motif */
      .viewport-grid {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.035) 1px,
            transparent 1px
          );
        background-size: 48px 48px;
        mask-image: radial-gradient(
          ellipse 80% 60% at 50% 0%,
          #000 10%,
          transparent 75%
        );
      }

      header {
        padding: 28px 24px;
        display: flex;
        justify-content: center;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .logo-accent {
        color: var(--color-accent);
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .thankyou-card {
        width: 100%;
        max-width: 560px;
        text-align: center;
        padding: 56px 40px;
        border-radius: var(--radius-lg);
        background: var(--color-surface);
        border: 1px solid var(--color-surface-border);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow-soft);
        opacity: 0;
        transform: translateY(20px);
        animation: cardIn 0.7s ease forwards;
      }

      @keyframes cardIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Animated checkmark */
      .check-wrap {
        width: 92px;
        height: 92px;
        margin: 0 auto 28px;
        border-radius: 50%;
        background: rgba(34, 197, 94, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .check-circle {
        stroke: var(--color-success);
        stroke-width: 3;
        fill: none;
        stroke-dasharray: 160;
        stroke-dashoffset: 160;
        animation: drawCircle 0.6s ease forwards 0.15s;
      }

      .check-mark {
        stroke: var(--color-success);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        stroke-dasharray: 40;
        stroke-dashoffset: 40;
        animation: drawCheck 0.4s ease forwards 0.7s;
      }

      @keyframes drawCircle {
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes drawCheck {
        to {
          stroke-dashoffset: 0;
        }
      }

      .thankyou-title {
        font-size: clamp(1.6rem, 4vw, 2.1rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 12px;
      }

      .thankyou-subtitle {
        color: var(--color-text-muted);
        font-weight: 300;
        font-size: 1.02rem;
        max-width: 420px;
        margin: 0 auto 32px;
      }

      .thankyou-subtitle strong {
        color: var(--color-accent);
        font-weight: 600;
      }

      /* Next steps list */
      .next-steps {
        text-align: left;
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 36px;
      }

      .step {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 16px 18px;
        border-radius: var(--radius-sm);
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--color-surface-border);
      }

      .step-number {
        flex-shrink: 0;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--color-accent);
        color: #fff;
        font-size: 0.85rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .step-text {
        font-size: 0.92rem;
        color: var(--color-text);
      }

      .step-text strong {
        display: block;
        font-size: 0.95rem;
        margin-bottom: 2px;
      }

      .step-text span {
        color: var(--color-text-muted);
        font-weight: 300;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 16px 32px;
        border-radius: var(--radius-sm);
        font-weight: 600;
        font-size: 1rem;
        border: none;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          background 0.2s ease;
      }

      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--color-accent),
          var(--color-accent-dark)
        );
        color: #fff;
        box-shadow: 0 12px 30px rgba(249, 115, 22, 0.35);
        margin-bottom: 12px;
      }

      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 16px 40px rgba(249, 115, 22, 0.5);
      }

      .btn-secondary {
        background: var(--color-surface);
        color: var(--color-text);
        border: 1px solid var(--color-surface-border);
      }

      .btn-secondary:hover {
        transform: translateY(-3px);
        border-color: var(--color-accent);
        background: rgba(249, 115, 22, 0.08);
      }

      .btn-icon {
        flex-shrink: 0;
      }

      .nav-logo img {
        height: 60px;
        width: auto;
        display: block;
        transition: all 0.3s ease;
      }

      footer {
        text-align: center;
        padding: 24px;
        color: var(--color-text-muted);
        font-size: 0.82rem;
      }

      @media (max-width: 480px) {
        .thankyou-card {
          padding: 40px 24px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>

    <div class="viewport-grid" aria-hidden="true"></div>

    <main>

        <h1 class="thankyou-title">Thank You for Your Purchase!</h1>
        <p class="thankyou-subtitle">

        <div class="next-steps">

        </div>

        >
          <svg

            <path

            <path fill="currentColor" d="M6.2 20.5h11.6l1.7-3H4.5z" />
          </svg>
          Download Course Materials
        </a>

        <a href="../index.html" class="btn btn-secondary">Back to Home</a>
      </div>
    </main>

    <footer>
      © 2026 Blender Masterclass – Freelance Edition. All Rights Reserved.
    </footer>

    <!-- ===================== INLINE SCRIPT ===================== -->

      document.addEventListener("DOMContentLoaded", () => {
        // Fire a Meta Pixel "Purchase" conversion event, if the Pixel is loaded on this page.
        // Safe no-op if fbq isn't present (e.g. Pixel script missing or blocked).
        if (typeof fbq === "function") {
          fbq("track", "Purchase", { value: 999, currency: "INR" });
        }
      });
    </script>
  </body>
</html>
